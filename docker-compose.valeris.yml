volumes:
  mongo_data:
  uploads_data:

services:
  mongo:
    image: mongo:6
    container_name: rental_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: rental_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ${VALERIS_ENV_FILE:-.env.valeris}
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/rentalapp
    ports:
      - "127.0.0.1:${APP_BIND_PORT:-3100}:3000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ready | grep '\"ready\":true'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
